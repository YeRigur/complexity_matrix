<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complexity Calculator — D / V / U</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Segoe UI",system-ui,sans-serif;background:#f3f6fb;color:#18212f;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}

.calc{background:#fff;border-radius:16px;box-shadow:0 8px 32px rgba(15,23,42,.08);padding:32px;max-width:520px;width:100%;}
h1{font-size:20px;margin-bottom:4px;}
.subtitle{font-size:13px;color:#5d6b7c;margin-bottom:24px;}

.dim{margin-bottom:16px;}
.dim label{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;margin-bottom:6px;}
.dim label .dot{width:10px;height:10px;border-radius:50%;}
.dim label .hint{font-weight:400;color:#5d6b7c;}
.dim select{width:100%;padding:10px 12px;border:1px solid #d6dee8;border-radius:10px;font-size:14px;background:#fff;color:#18212f;cursor:pointer;}

.result{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:24px;}
.res-box{padding:16px;border-radius:12px;text-align:center;transition:background .2s,color .2s;}
.res-box .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.05em;opacity:.7;margin-bottom:6px;}
.res-box .val{font-size:32px;font-weight:800;line-height:1;}
.res-box .val-text{font-size:22px;font-weight:800;line-height:1;}

.formula{margin-top:16px;padding:12px 16px;border-radius:10px;border:1px dashed #d6dee8;font-size:13px;color:#5d6b7c;text-align:center;}
.formula .eq{font-weight:700;color:#18212f;font-size:14px;}
.formula .tags{margin-top:6px;display:flex;justify-content:center;gap:6px;flex-wrap:wrap;}
.formula .tag{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;}
.tag-d{background:#f3e8ff;color:#9333ea;}
.tag-v{background:#ccfbf1;color:#0d9488;}
.tag-u{background:#dbeafe;color:#6b88b0;}

/* Exception reason */
.exc-reason{margin-top:16px;display:none;}
.exc-reason.visible{display:block;}
.exc-reason label{display:block;font-size:13px;font-weight:700;margin-bottom:6px;color:#991b1b;}
.exc-reason select{width:100%;padding:10px 12px;border:1px solid #fca5a5;border-radius:10px;font-size:14px;background:#fff;color:#18212f;cursor:pointer;}
.exc-reason .exc-hint{margin-top:6px;font-size:11px;color:#5d6b7c;line-height:1.4;}

.bar{margin-top:16px;}
.bar-label{font-size:10px;font-weight:700;text-transform:uppercase;color:#5d6b7c;margin-bottom:6px;}
.bar-track{display:flex;height:28px;border-radius:8px;overflow:hidden;border:1px solid #d6dee8;}
.bar-seg{display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;transition:opacity .2s;}
.bar-seg.dim{opacity:.2;}
.seg-low{background:#166534;flex:2;}
.seg-med{background:#a16207;flex:2;}
.seg-high{background:#b91c1c;flex:2;}
.seg-highest{background:#7c2d12;flex:1;}

.note{margin-top:14px;padding:10px 14px;border-radius:10px;font-size:12px;line-height:1.5;display:none;}
.note.warn{display:block;background:#fffbeb;border:1px solid #fde68a;color:#92400e;}
.note.exc{display:block;background:#fee2e2;border:1px solid #fca5a5;color:#991b1b;}

.low{background:#dcfce7;color:#166534;}
.med{background:#fef3c7;color:#a16207;}
.high{background:#fee2e2;color:#b91c1c;}
.highest{background:#ffedd5;color:#7c2d12;}
.exception{background:#fee2e2;color:#991b1b;}
</style>
</head>
<body>

<div class="calc">
  <h1>Complexity Calculator</h1>
  <p class="subtitle">D / V / U scoring model</p>

  <div class="dim">
    <label><span class="dot" style="background:#9333ea"></span> Difficulty <span class="hint">— how hard?</span></label>
    <select id="d">
      <option value="1">1 — Simple and clear</option>
      <option value="2" selected>2 — Moderate, some thinking needed</option>
      <option value="3">3 — Complex, research needed</option>
      <option value="other">Other — can't assess</option>
    </select>
  </div>

  <div class="dim">
    <label><span class="dot" style="background:#0d9488"></span> Volume <span class="hint">— how much?</span></label>
    <select id="v">
      <option value="1" selected>1 — One change</option>
      <option value="2">2 — A few changes</option>
      <option value="3">3 — Many changes</option>
      <option value="other">Other — can't assess</option>
    </select>
  </div>

  <div class="dim">
    <label><span class="dot" style="background:#6b88b0"></span> Unknown <span class="hint">— how uncertain?</span></label>
    <select id="u">
      <option value="1" selected>1 — Clear requirements</option>
      <option value="2">2 — Some gaps or unclear edges</option>
      <option value="3">3 — Major unknowns</option>
      <option value="other">Other — can't assess</option>
    </select>
  </div>

  <div class="result">
    <div class="res-box" id="resScore"><div class="lbl">Score</div><div class="val" id="score">4</div></div>
    <div class="res-box" id="resBand"><div class="lbl">Complexity</div><div class="val-text" id="band">Low</div></div>
  </div>

  <div class="formula">
    <div class="eq" id="eq">D(2) + V(1) + U(1) = 4</div>
    <div class="tags">
      <span class="tag tag-d" id="tagD">D: 2</span>
      <span class="tag tag-v" id="tagV">V: 1</span>
      <span class="tag tag-u" id="tagU">U: 1</span>
    </div>
  </div>

  <div class="exc-reason" id="excReason">
    <label>Exception Reason</label>
    <select id="reason">
      <option value="">— Select reason —</option>
      <option value="too_variable">Too variable</option>
      <option value="too_unclear">Too unclear</option>
      <option value="too_large">Too large</option>
      <option value="too_risky">Too risky</option>
      <option value="too_abnormal">Too abnormal</option>
      <option value="too_unstable">Too unstable</option>
    </select>
    <div class="exc-hint" id="excHint"></div>
  </div>

  <div class="bar">
    <div class="bar-label">Score map</div>
    <div class="bar-track">
      <div class="bar-seg seg-low" id="seg-low">3–4 Low</div>
      <div class="bar-seg seg-med" id="seg-med">5–6 Med</div>
      <div class="bar-seg seg-high" id="seg-high">7–8 High</div>
      <div class="bar-seg seg-highest" id="seg-highest">9 H+</div>
    </div>
  </div>

  <div class="note" id="note"></div>
</div>

<script>
const $ = id => document.getElementById(id);

const BANDS = [
  {max:4, key:'low', label:'Low'},
  {max:6, key:'med', label:'Medium'},
  {max:8, key:'high', label:'High'},
  {max:9, key:'highest', label:'Highest (H+)'}
];

function calc() {
  const dVal = $('d').value, vVal = $('v').value, uVal = $('u').value;
  const hasOther = dVal === 'other' || vVal === 'other' || uVal === 'other';
  const d = dVal === 'other' ? 0 : +dVal;
  const v = vVal === 'other' ? 0 : +vVal;
  const u = uVal === 'other' ? 0 : +uVal;
  const score = d + v + u;
  const isHPlus = !hasOther && score === 9;
  const needsReason = hasOther || isHPlus;

  const note = $('note');
  const excReason = $('excReason');
  const excHint = $('excHint');

  // Show/hide exception reason
  excReason.classList.toggle('visible', needsReason);

  if (hasOther) {
    // Exception (Other)
    $('score').textContent = '—';
    $('band').textContent = 'Exception';
    $('resScore').className = 'res-box exception';
    $('resBand').className = 'res-box exception';
    $('eq').textContent = 'Standard scoring not applicable';
    $('tagD').textContent = dVal === 'other' ? 'D: Other' : `D: ${d}`;
    $('tagV').textContent = vVal === 'other' ? 'V: Other' : `V: ${v}`;
    $('tagU').textContent = uVal === 'other' ? 'U: Other' : `U: ${u}`;

    ['low','med','high','highest'].forEach(s => $('seg-'+s).classList.add('dim'));

    excHint.textContent = 'Ticket doesn\'t fit standard model. Select why.';
    note.className = 'note exc';
    note.innerHTML = '<b>Exception</b> — Custom effort estimate required. Dev must justify why standard scoring doesn\'t apply.';

  } else {
    // Normal scoring
    const band = BANDS.find(b => score <= b.max);
    $('score').textContent = score;
    $('band').textContent = band.label;
    $('resScore').className = 'res-box ' + band.key;
    $('resBand').className = 'res-box ' + band.key;
    $('eq').textContent = `D(${d}) + V(${v}) + U(${u}) = ${score}`;
    $('tagD').textContent = `D: ${d}`;
    $('tagV').textContent = `V: ${v}`;
    $('tagU').textContent = `U: ${u}`;

    ['low','med','high','highest'].forEach(s => {
      $('seg-'+s).classList.toggle('dim', s !== band.key);
    });

    if (isHPlus) {
      excHint.textContent = 'Score = 9. At the edge of standard model. Select exception reason.';
      note.className = 'note exc';
      note.innerHTML = '<b>Highest (H+)</b> — Exception-grade. Time-based handling, closely governed.';
    } else if (u === 3) {
      note.className = 'note warn';
      note.innerHTML = '<b>High Unknown</b> — Major uncertainty. Consider investigation spike before full estimation.';
    } else if (d === 3 && v >= 2) {
      note.className = 'note warn';
      note.innerHTML = '<b>Complex + Volume</b> — High difficulty with significant volume. Validate scope.';
    } else {
      note.className = 'note';
    }
  }
}

['d','v','u','reason'].forEach(id => $(id).addEventListener('change', calc));
calc();
</script>
</body>
</html>
